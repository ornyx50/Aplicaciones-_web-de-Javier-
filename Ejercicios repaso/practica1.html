<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario para validar</title>
</head>
<body>

  <h2>Formulario para Registro</h2>

  <form id="formRegistro">

    <label>
      Nombre:
      <input type="text" id="nombre">
    </label>
    <br><br>

    <label>
      Edad:
      <input type="number" id="edad">
    </label>
    <br><br>

    <label>
      Email:
      <input type="text" id="email">
    </label>
    <br><br>

    <label>
      Contraseña:
      <input type="password" id="password">
    </label>
    <br><br>

    <label>
      Repetir contraseña:
      <input type="password" id="repetirPassword">
    </label>
    <br><br>

    <button type="button" onclick="validarFormulario()">Validar</button>

  </form>

  <br>

  <div id="mensajes"></div>

  <script>

    function validarNombre(nombre) {
      if (nombre === "") {
        return false;
      }
      if (nombre.length < 3) {
        return false;
      }
      return true;
    }

    function validarEdad(edad) {
      if (edad === "" || isNaN(edad)) {
        return false;
      }
      if (Number(edad) < 18) {
        return false;
      }
      return true;
    }

    function validarEmail(email) {
      if (email.indexOf("@") === -1) {
        return false;
      }
      if (email.indexOf(".") === -1) {
        return false;
      }
      if (email.indexOf("@") > email.lastIndexOf(".")) {
        return false;
      }
      return true;
    }

    function validarPassword(password) {
      if (password.length < 6) {
        return false;
      }
      return true;
    }

    function validarPasswordRepetida(password, repetirPassword) {
      if (password !== repetirPassword) {
        return false;
      }
      return true;
    }



    function validarFormulario() {

      const nombre = document.getElementById("nombre").value;
      const edad = document.getElementById("edad").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const repetirPassword = document.getElementById("repetirPassword").value;

      const errores = [];

      if (!validarNombre(nombre)) {
        errores.push("El nombre debe tener al menos 3 caracteres y no estar vacío.");
      }

      if (!validarEdad(edad)) {
        errores.push("La edad debe ser un número y mayor o igual a 18.");
      }

      if (!validarEmail(email)) {
        errores.push("El email no es válido (ejemplo: persona@correo.com).");
      }

      if (!validarPassword(password)) {
        errores.push("La contraseña debe tener al menos 6 caracteres.");
      }

      if (!validarPasswordRepetida(password, repetirPassword)) {
        errores.push("Las contraseñas no coinciden.");
      }

      const mensajesDiv = document.getElementById("mensajes");

      if (errores.length === 0) {
        mensajesDiv.innerHTML = "<p style='color: green;'><strong>Formulario válido. Registro correcto.</strong></p>";
      } else {
        let html = "<p style='color: red;'><strong>Formulario NO válido</strong></p>";
        html += "<ul>";

        for (let i = 0; i < errores.length; i++) {
          html += "<li>" + errores[i] + "</li>";
        }

        html += "</ul>";
        mensajesDiv.innerHTML = html;
      }
    }
  </script>

</body>
</html>
