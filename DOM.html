<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba DOM</title>
</head>
<body>

    <p onclick="nuevoParrafo()">
        Primer párrafo con un enlace
        <a href="https://www.google.com">enlace a Google</a>
    </p>

    <p onclick="quitaParrafo()">
        Segundo párrafo con un  enlace
        <a href="https://www.wikipedia.org">enlace a Wikipedia</a>
    </p>

    <p>
        Tercer parrafo con diferentes enlaces:
        <a href="https://www.openai.com">OpenAI</a>,
        <a href="https://www.github.com">GitHub</a>
    </p>

    <br>

   
    <input type="button" value="Cambiar color" onclick="cambiarColor()">
    <input type="button" value="Ocultar párrafo" onclick="ocultarParrafo()">
    <input type="button" value="Mostrar párrafo" onclick="mostrarParrafo()">

    <script>
   

    
        alert("Número total de enlaces: " + document.links.length);

      
        alert("El primer enlace apunta a: " + document.links[0].href);

     
        let tercerParrafo = document.getElementsByTagName("p")[2];
        let enlacesTercerParrafo = tercerParrafo.getElementsByTagName("a").length;
        alert("Enlaces en el tercer párrafo: " + enlacesTercerParrafo);

      
        function nuevoParrafo() {
            let p = document.createElement("p");
            p.textContent = "Nuevo párrafo";
            document.body.appendChild(p);
        }

        function quitaParrafo() {
            let parrafos = document.getElementsByTagName("p");
            if (parrafos.length > 0) {
                document.body.removeChild(parrafos[parrafos.length - 1]);
            }
        }

       

        function cambiarColor() {
            let primerParrafo = document.getElementsByTagName("p")[0];
            primerParrafo.style.backgroundColor = "yellow";
        }

        function ocultarParrafo() {
            let segundoParrafo = document.getElementsByTagName("p")[1];
            segundoParrafo.style.display = "none";
        }

        function mostrarParrafo() {
            let segundoParrafo = document.getElementsByTagName("p")[1];
            segundoParrafo.style.display = "block";
        }
    </script>

</body>
</html>
