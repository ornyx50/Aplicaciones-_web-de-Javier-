<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Calculadora de notas</h1>

<form id="formNotas">
    <label>
        Nota 1:
        <input type="number" id="nota1" min="0" max="10" step="0.1">
    </label>
    <br><br>

    <label>
        Nota 2:
        <input type="number" id="nota2" min="0" max="10" step="0.1">
    </label>
    <br><br>

    <label>
        Nota 3:
        <input type="number" id="nota3" min="0" max="10" step="0.1">
    </label>
    <br><br>

    <button type="button" id="btnCalcular">Calcular nota final</button>
</form>

<p id="resultado"></p>

<script>
let nota1 = document.getElementById("nota1");
let nota2 = document.getElementById("nota2");
let nota3 = document.getElementById("nota3");
let btnCalcular = document.getElementById("btnCalcular");
let resultado = document.getElementById("resultado");

btnCalcular.addEventListener("click", () => {

    let n1 = Number(nota1.value);
    let n2 = Number(nota2.value);
    let n3 = Number(nota3.value);

    resultado.classList.remove(
        "error",
        "suspenso",
        "aprobado",
        "notable",
        "sobresaliente"
    );

    if (
        nota1.value === "" ||
        nota2.value === "" ||
        nota3.value === "" ||
        n1 < 0 || n1 > 10 ||
        n2 < 0 || n2 > 10 ||
        n3 < 0 || n3 > 10
    ) {
        resultado.textContent = "Error: introduce tres notas válidas entre 0 y 10";
        resultado.classList.add("error");
        return;
    }

    let media = (n1 + n2 + n3) / 3;
    let texto = "";
    let clase = "";

    if (media < 5) {
        texto = "Suspenso";
        clase = "suspenso";
    } else if (media < 7) {
        texto = "Aprobado";
        clase = "aprobado";
    } else if (media < 9) {
        texto = "Notable";
        clase = "notable";
    } else {
        texto = "Sobresaliente";
        clase = "sobresaliente";
    }

    resultado.textContent = `Nota media: ${media.toFixed(1)} - ${texto}`;
    resultado.classList.add(clase);
});
</script>

</body>
</html>
